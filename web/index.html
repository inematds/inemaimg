<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>inemaimg — playground</title>
<style>
  :root {
    --bg: #0b0c10;
    --panel: #14161d;
    --panel-2: #1b1e27;
    --border: #2a2e3a;
    --text: #e6e8ef;
    --muted: #8a90a2;
    --accent: #6ea8ff;
    --accent-2: #9d7cff;
    --ok: #3ddc97;
    --warn: #ffb454;
    --err: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, "Segoe UI", Roboto, Inter, sans-serif; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  h1 { font-size: 18px; margin: 0; letter-spacing: .3px; }
  h1 span { color: var(--muted); font-weight: 400; margin-left: 6px; font-size: 13px; }
  .badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
    border: 1px solid var(--border); border-radius: 999px; background: var(--panel);
    font-size: 12px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .dot.warn { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .dot.err { background: var(--err); box-shadow: 0 0 8px var(--err); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); margin: 0 0 14px; font-weight: 600; }

  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  input[type=text], input[type=number], select, textarea {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 10px 12px; font: inherit; outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 96px; font-family: inherit; }

  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .row > div { min-width: 0; }

  .drop { border: 1.5px dashed var(--border); border-radius: 12px; padding: 18px;
    text-align: center; color: var(--muted); cursor: pointer; transition: .15s; }
  .drop:hover, .drop.drag { border-color: var(--accent); color: var(--text); background: var(--panel-2); }
  .thumbs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .thumb { position: relative; width: 72px; height: 72px; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb button { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.6);
    border: 0; color: #fff; border-radius: 50%; width: 18px; height: 18px; cursor: pointer;
    font-size: 12px; line-height: 1; padding: 0; }

  .field { margin-bottom: 14px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }

  button.primary { width: 100%; padding: 13px; border: 0; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; letter-spacing: .3px; }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }

  .result { display: flex; align-items: center; justify-content: center; min-height: 320px;
    border-radius: 12px; background: var(--panel-2); border: 1px dashed var(--border);
    overflow: hidden; position: relative; }
  .result.empty { color: var(--muted); font-size: 13px; }
  .result img { max-width: 100%; max-height: 560px; display: block; border-radius: 6px; }
  .meta { margin-top: 12px; display: flex; justify-content: space-between; color: var(--muted);
    font-size: 12px; }
  .meta a { color: var(--accent); text-decoration: none; }

  .spinner { width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .busy { display: flex; flex-direction: column; align-items: center; gap: 14px; color: var(--muted); }
  .busy .elapsed { font-variant-numeric: tabular-nums; font-size: 26px; font-weight: 500;
    color: var(--text); letter-spacing: 1px; }
  .busy .elapsed-hint { font-size: 11px; color: var(--muted); }

  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .err-box { border: 1px solid #5b2b2b; background: #2a1515; color: #ffb4b4;
    padding: 10px 12px; border-radius: 10px; font-size: 12px; white-space: pre-wrap; }

  /* History */
  .history-head { display: flex; align-items: center; justify-content: space-between;
    margin: 24px 0 10px; }
  .history-head h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); margin: 0; font-weight: 600; }
  .history-head button { background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px; padding: 6px 10px; font-size: 11px;
    cursor: pointer; }
  .history-head button:hover { color: var(--text); border-color: var(--accent); }
  .history { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px; }
  .hist-item { background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; cursor: pointer; transition: .15s;
    display: flex; flex-direction: column; position: relative; }
  .hist-item:hover { border-color: var(--accent); transform: translateY(-2px); }
  .hist-item .thumb-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
    background: var(--panel-2); }
  .hist-item .info { padding: 8px 10px 10px; }
  .hist-item .prompt { font-size: 12px; color: var(--text); display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    line-height: 1.35; min-height: 32px; }
  .hist-item .sub { font-size: 10px; color: var(--muted); margin-top: 4px;
    display: flex; justify-content: space-between; gap: 4px; }
  .hist-item .del { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
    background: rgba(0,0,0,.65); border: 0; color: #fff; border-radius: 50%;
    font-size: 12px; line-height: 1; cursor: pointer; opacity: 0; transition: .15s; padding: 0; }
  .hist-item:hover .del { opacity: 1; }
  .history-empty { color: var(--muted); font-size: 12px; padding: 20px 0; text-align: center; }

  /* Size presets */
  .presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .preset { background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 6px 10px; font-size: 11px; cursor: pointer;
    font-family: inherit; }
  .preset:hover { color: var(--text); border-color: var(--accent); }
  .preset.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Model hint line */
  .model-hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4; }
  .model-hint b { color: var(--text); font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>inemaimg <span>playground</span></h1>
    <div class="badge"><span id="dot" class="dot"></span><span id="status">carregando…</span></div>
  </header>

  <div class="grid">
    <!-- Left column: controls -->
    <div class="card">
      <h2>Requisição</h2>
      <div class="stack">
        <div>
          <label for="model">Modelo</label>
          <select id="model"></select>
          <div id="model-hint" class="model-hint"></div>
        </div>

        <div>
          <label for="prompt">Prompt</label>
          <textarea id="prompt" placeholder="descreva a imagem ou a edição desejada…"></textarea>
        </div>

        <div>
          <label>Imagens de referência (opcional — modelos de edição)</label>
          <div id="drop" class="drop">clique ou arraste imagens aqui</div>
          <input id="file" type="file" accept="image/*" multiple hidden />
          <div id="thumbs" class="thumbs"></div>
        </div>

        <div>
          <label>Tamanho</label>
          <div class="presets" id="presets">
            <button type="button" class="preset" data-w="384"  data-h="384">384²</button>
            <button type="button" class="preset" data-w="512"  data-h="512">512²</button>
            <button type="button" class="preset" data-w="768"  data-h="768">768²</button>
            <button type="button" class="preset" data-w="1024" data-h="1024">1024²</button>
            <button type="button" class="preset" data-w="1024" data-h="1536">9:16</button>
            <button type="button" class="preset" data-w="1536" data-h="1024">16:9</button>
          </div>
          <div class="row-2">
            <div>
              <label for="width" class="hint">width</label>
              <input id="width" type="number" value="1024" min="128" max="2048" step="64" />
            </div>
            <div>
              <label for="height" class="hint">height</label>
              <input id="height" type="number" value="1024" min="128" max="2048" step="64" />
            </div>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="steps">Steps</label>
            <input id="steps" type="number" value="40" min="1" max="150" />
          </div>
          <div>
            <label for="cfg">cfg / guidance</label>
            <input id="cfg" type="number" value="4" step="0.1" />
          </div>
          <div>
            <label for="seed">Seed</label>
            <input id="seed" type="number" placeholder="aleatório" />
          </div>
        </div>

        <button id="go" class="primary">Gerar</button>
        <div id="err" class="err-box" style="display:none"></div>
      </div>
    </div>

    <!-- Right column: result -->
    <div class="card">
      <h2>Resultado</h2>
      <div id="result" class="result empty">nenhuma geração ainda</div>
      <div class="meta">
        <span id="meta-model"></span>
        <span id="meta-time"></span>
      </div>
      <div class="meta">
        <span id="meta-gpu"></span>
        <a id="download" href="#" download="inemaimg.png" style="display:none">baixar PNG</a>
      </div>
    </div>
  </div>

  <div class="history-head">
    <h2>Histórico</h2>
    <button id="clear-history" title="apagar histórico">limpar</button>
  </div>
  <div id="history" class="history"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const state = { images: [] }; // {name, b64, dataUrl}

// Per-model sane defaults and perf hints. Applied when the user picks a model.
const MODEL_DEFAULTS = {
  "qwen-edit-2511": {
    steps: 40, cfg: 4.0, width: 1024, height: 1024,
    hint: "edição multi-imagem · 40 steps padrão · <b>pesado</b> (~3–4 min / 1024²)",
  },
  "ernie": {
    steps: 50, cfg: 4.0, width: 1024, height: 1024,
    hint: "text-to-image puro · rejeita imagens de referência · ~2–3 min / 1024²",
  },
  "flux2-klein": {
    steps: 4, cfg: 1.0, width: 1024, height: 1024,
    hint: "step-distilled · <b>4 steps fixos</b> · non-commercial · o mais rápido",
  },
  "flux2-dev": {
    steps: 28, cfg: 4.0, width: 1024, height: 1024,
    hint: "premium 4-bit · 28 steps padrão · non-commercial",
  },
};

function applyModelDefaults(id) {
  const d = MODEL_DEFAULTS[id]; if (!d) return;
  $("steps").value = d.steps;
  $("cfg").value = d.cfg;
  $("width").value = d.width;
  $("height").value = d.height;
  $("model-hint").innerHTML = d.hint;
  syncPresets();
}

function syncPresets() {
  const w = parseInt($("width").value, 10), h = parseInt($("height").value, 10);
  document.querySelectorAll(".preset").forEach((btn) => {
    const match = parseInt(btn.dataset.w, 10) === w && parseInt(btn.dataset.h, 10) === h;
    btn.classList.toggle("active", match);
  });
}

// History: thumbs + metadata persisted in localStorage; full-res images
// only kept for the current session so we don't blow the 5MB quota.
const HISTORY_KEY = "inemaimg_history_v1";
const HISTORY_MAX = 40;
const fullCache = new Map(); // id -> full dataUrl (session only)

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); }
  catch { return []; }
}
function saveHistory(h) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }
  catch (e) {
    // quota exceeded — drop oldest half and retry once
    const trimmed = h.slice(0, Math.floor(h.length / 2));
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(trimmed)); } catch {}
  }
}

// Downscale a PNG dataUrl to a small JPEG thumb for localStorage.
async function makeThumb(fullDataUrl, size = 256, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(size / img.width, size / img.height, 1);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = reject;
    img.src = fullDataUrl;
  });
}

function renderHistory() {
  const h = loadHistory();
  const wrap = $("history");
  if (!h.length) {
    wrap.innerHTML = '<div class="history-empty">nenhuma geração ainda — faça uma pra começar o histórico</div>';
    return;
  }
  wrap.innerHTML = "";
  h.forEach((item) => {
    const el = document.createElement("div");
    el.className = "hist-item";
    el.title = item.prompt;
    const when = new Date(item.ts).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
    el.innerHTML = `
      <img class="thumb-img" src="${item.thumb}" alt="" />
      <div class="info">
        <div class="prompt">${escapeHtml(item.prompt)}</div>
        <div class="sub">
          <span>${escapeHtml(item.model)}</span>
          <span>${item.time}s · ${when}</span>
        </div>
      </div>
      <button class="del" title="remover">×</button>
    `;
    el.onclick = (e) => {
      if (e.target.classList.contains("del")) {
        const next = loadHistory().filter((x) => x.id !== item.id);
        saveHistory(next);
        fullCache.delete(item.id);
        renderHistory();
        return;
      }
      showFromHistory(item);
    };
    wrap.appendChild(el);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function showFromHistory(item) {
  const result = $("result");
  const src = fullCache.get(item.id) || item.thumb;
  const note = fullCache.has(item.id) ? "" : " (sessão anterior — thumb)";
  result.className = "result";
  result.innerHTML = `<img src="${src}" alt="resultado" />`;
  $("meta-model").textContent = `modelo: ${item.model}${note}`;
  $("meta-time").textContent = `tempo: ${item.time}s`;
  $("meta-gpu").textContent = "";
  const dl = $("download");
  dl.href = src;
  dl.download = `inemaimg-${item.id}.${fullCache.has(item.id) ? "png" : "jpg"}`;
  dl.style.display = "inline";
  // Also restore prompt/params into the form so you can tweak & regenerate
  $("prompt").value = item.prompt;
  $("model").value = item.model;
  if (item.steps) $("steps").value = item.steps;
  if (item.seed != null) $("seed").value = item.seed;
}

async function pushHistory(entry, fullDataUrl) {
  try {
    entry.thumb = await makeThumb(fullDataUrl);
  } catch {
    entry.thumb = fullDataUrl; // fallback
  }
  fullCache.set(entry.id, fullDataUrl);
  const h = loadHistory();
  h.unshift(entry);
  if (h.length > HISTORY_MAX) h.length = HISTORY_MAX;
  saveHistory(h);
  renderHistory();
}

// Timer that ticks while a generation is in flight.
let timerId = null;
function startTimer(el) {
  const t0 = performance.now();
  const tick = () => {
    const dt = (performance.now() - t0) / 1000;
    const mm = Math.floor(dt / 60);
    const ss = (dt - mm * 60).toFixed(1);
    el.textContent = mm > 0 ? `${mm}:${ss.padStart(4, "0")}` : `${ss}s`;
  };
  tick();
  timerId = setInterval(tick, 100);
  return () => {
    clearInterval(timerId); timerId = null;
    return (performance.now() - t0) / 1000;
  };
}

async function refreshHealth() {
  try {
    const r = await fetch("/health");
    const j = await r.json();
    const dot = $("dot"), status = $("status");
    const p = j.prewarm_status;
    if (p === "ready" || (j.loaded_model && p !== "failed")) {
      dot.className = "dot ok";
      status.textContent = `pronto — ${j.loaded_model || "sem modelo"} · ${j.gpu_memory_allocated_gb} GB`;
    } else if (p === "running") {
      dot.className = "dot warn";
      status.textContent = "carregando modelo…";
    } else if (p === "failed") {
      dot.className = "dot err";
      status.textContent = "prewarm falhou — ver logs";
    } else {
      dot.className = "dot warn";
      status.textContent = j.cuda_available ? "ocioso" : "sem GPU";
    }
  } catch (e) {
    $("dot").className = "dot err";
    $("status").textContent = "servidor offline";
  }
}

async function loadModels() {
  try {
    const r = await fetch("/models");
    const j = await r.json();
    const sel = $("model");
    sel.innerHTML = "";
    for (const m of j.available) {
      const opt = document.createElement("option");
      opt.value = m; opt.textContent = m;
      if (m === j.loaded) opt.selected = true;
      sel.appendChild(opt);
    }
    applyModelDefaults(sel.value);
  } catch (e) { /* handled by health */ }
}

function renderThumbs() {
  const wrap = $("thumbs");
  wrap.innerHTML = "";
  state.images.forEach((img, i) => {
    const el = document.createElement("div");
    el.className = "thumb";
    el.innerHTML = `<img src="${img.dataUrl}" alt="" /><button title="remover">×</button>`;
    el.querySelector("button").onclick = () => { state.images.splice(i, 1); renderThumbs(); };
    wrap.appendChild(el);
  });
}

function addFiles(files) {
  [...files].forEach((f) => {
    if (!f.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      const b64 = dataUrl.split(",")[1];
      state.images.push({ name: f.name, b64, dataUrl });
      renderThumbs();
    };
    reader.readAsDataURL(f);
  });
}

// Drop + click
const drop = $("drop"), fileInput = $("file");
drop.onclick = () => fileInput.click();
fileInput.onchange = (e) => addFiles(e.target.files);
drop.ondragover = (e) => { e.preventDefault(); drop.classList.add("drag"); };
drop.ondragleave = () => drop.classList.remove("drag");
drop.ondrop = (e) => { e.preventDefault(); drop.classList.remove("drag"); addFiles(e.dataTransfer.files); };

// Generate
$("go").onclick = async () => {
  const btn = $("go"), errBox = $("err"), result = $("result");
  const prompt = $("prompt").value.trim();
  if (!prompt) { errBox.style.display = "block"; errBox.textContent = "prompt vazio"; return; }
  errBox.style.display = "none";
  btn.disabled = true; btn.textContent = "gerando…";
  result.className = "result";
  result.innerHTML = `
    <div class="busy">
      <div class="spinner"></div>
      <div class="elapsed" id="elapsed">0.0s</div>
      <div class="elapsed-hint">gerando…</div>
    </div>`;
  $("meta-model").textContent = ""; $("meta-time").textContent = "";
  $("meta-gpu").textContent = ""; $("download").style.display = "none";

  const stopTimer = startTimer($("elapsed"));

  const seed = $("seed").value;
  const steps = parseInt($("steps").value, 10) || undefined;
  const width = parseInt($("width").value, 10) || undefined;
  const height = parseInt($("height").value, 10) || undefined;
  const cfg = parseFloat($("cfg").value);
  const model = $("model").value;
  // Qwen's "cfg" dial is true_cfg_scale (guidance_scale is fixed at 1.0).
  // Everything else (FLUX, ERNIE) uses guidance_scale.
  const body = {
    model,
    prompt,
    steps,
    width,
    height,
    seed: seed === "" ? undefined : parseInt(seed, 10),
    images: state.images.length ? state.images.map((i) => i.b64) : undefined,
  };
  if (Number.isFinite(cfg)) {
    if (model === "qwen-edit-2511") body.true_cfg_scale = cfg;
    else body.guidance_scale = cfg;
  }

  try {
    const r = await fetch("/generate", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body),
    });
    const j = await r.json();
    const wallS = stopTimer();
    if (!r.ok) throw new Error(j.detail || `HTTP ${r.status}`);
    const dataUrl = `data:image/png;base64,${j.image}`;
    result.innerHTML = `<img src="${dataUrl}" alt="resultado" />`;
    $("meta-model").textContent = `modelo: ${j.model_used}`;
    $("meta-time").textContent = `server: ${j.generation_time_s}s · wall: ${wallS.toFixed(1)}s`;
    $("meta-gpu").textContent = `VRAM: ${j.gpu_memory_allocated_gb} GB`;
    const dl = $("download");
    dl.href = dataUrl;
    dl.download = `inemaimg-${Date.now()}.png`;
    dl.style.display = "inline";
    refreshHealth();

    // Persist in history (thumb only, full image kept in-memory)
    await pushHistory({
      id: String(Date.now()) + "-" + Math.random().toString(36).slice(2, 7),
      ts: Date.now(),
      model: j.model_used,
      prompt,
      steps,
      seed: body.seed ?? null,
      time: j.generation_time_s,
    }, dataUrl);
  } catch (e) {
    if (timerId) stopTimer();
    result.className = "result empty"; result.textContent = "falhou";
    errBox.style.display = "block"; errBox.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = "Gerar";
  }
};

$("clear-history").onclick = () => {
  if (!confirm("Apagar todo o histórico?")) return;
  localStorage.removeItem(HISTORY_KEY);
  fullCache.clear();
  renderHistory();
};

// Size presets
document.querySelectorAll(".preset").forEach((btn) => {
  btn.onclick = () => {
    $("width").value = btn.dataset.w;
    $("height").value = btn.dataset.h;
    syncPresets();
  };
});
$("width").oninput = syncPresets;
$("height").oninput = syncPresets;

// When model changes, snap to its sensible defaults
$("model").addEventListener("change", (e) => applyModelDefaults(e.target.value));

// Boot
loadModels();
refreshHealth();
renderHistory();
setInterval(refreshHealth, 4000);
</script>
</body>
</html>
